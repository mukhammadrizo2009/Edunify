{% load static %}
<nav class="navbar navbar-expand-lg navbar-light sticky-top glass-nav shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <span class="fs-3 fw-bold text-gradient font-heading">Edunify</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1">
                <li class="nav-item">
                    <a class="nav-link px-3 {% if request.resolver_match.url_name == 'course_list' %}active fw-semibold{% endif %}"
                       href="{% url 'course_list' %}">
                       <i class="bi bi-compass me-1"></i> Kurslar
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 {% if 'quiz' in request.resolver_match.url_name|default:'' %}active fw-semibold{% endif %}"
                       href="{% url 'course_list' %}#testlar">
                       <i class="bi bi-patch-question me-1"></i> Testlar
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 d-flex align-items-center gap-1 {% if request.resolver_match.url_name == 'ai_page' %}active fw-semibold{% endif %}"
                       href="{% url 'ai_page' %}">
                       <span class="ai-nav-dot" aria-hidden="true"></span>
                       <i class="bi bi-stars me-1"></i> AI Muallim
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <!-- Theme Toggle Button -->
                <button class="btn btn-link text-decoration-none text-muted p-1 d-flex align-items-center justify-content-center" id="themeToggleBtn" aria-label="Toggle theme" style="border: none; background: transparent; outline: none; box-shadow: none;">
                    <i class="bi bi-moon fs-5" id="themeToggleIcon" style="color: var(--text-main);"></i>
                </button>

                <!-- Til almashtirgich (Pill style with globe icon and chevron-down) -->
                <div class="dropdown">
                    <button class="btn dropdown-toggle d-flex align-items-center gap-2 px-3 py-2 rounded-pill shadow-sm border" type="button" id="langDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="background-color: var(--bg-card); color: var(--text-main); border-color: var(--border-color) !important; font-weight: 500; font-size: 14px;">
                        <i class="bi bi-globe fs-5" style="color: var(--color-primary);"></i>
                        <span>
                            {% if lang == 'uz' or not lang %}O'zbek
                            {% elif lang == 'tj' %}Тоҷикӣ
                            {% elif lang == 'ru' %}Русский
                            {% elif lang == 'en' %}English{% endif %}
                        </span>
                        <i class="bi bi-chevron-down ms-1 text-muted" style="font-size: 10px;"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end border-0 shadow-lg" aria-labelledby="langDropdown">
                        <li><a class="dropdown-menu-item dropdown-item" href="?lang=uz">O'zbekcha</a></li>
                        <li><a class="dropdown-menu-item dropdown-item" href="?lang=tj">Тоҷикӣ</a></li>
                        <li><a class="dropdown-menu-item dropdown-item" href="?lang=ru">Русский</a></li>
                        <li><a class="dropdown-menu-item dropdown-item" href="?lang=en">English</a></li>
                    </ul>
                </div>

                {% if user.is_authenticated %}
                    <div class="dropdown">
                        <button class="btn btn-purple rounded-pill dropdown-toggle d-flex align-items-center gap-2 px-4" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" alt="avatar" class="rounded-circle" style="width: 24px; height: 24px; object-fit: cover;">
                            {% else %}
                                <i class="bi bi-person-circle"></i>
                            {% endif %}
                            <span>{{ user.username }}</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end border-0 shadow-lg" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                            {% if user.is_staff or user.role == 'admin' %}
                                <li><a class="dropdown-item" href="{% url 'admin:index' %}" target="_blank"><i class="bi bi-shield-lock me-2"></i> Admin Panel</a></li>
                            {% endif %}
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i> Chiqish</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-dark fw-medium"><i class="bi bi-box-arrow-in-right me-1"></i> Kirish</a>
                    <a href="{% url 'register' %}" class="btn btn-purple rounded-pill px-4 py-2"><i class="bi bi-person-plus me-1"></i> Boshlash</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<script>
    // Til almashtirish jarayonida URL dagi query parametrlarni saqlab qolish
    document.addEventListener("DOMContentLoaded", function() {
        const langItems = document.querySelectorAll(".dropdown-menu-item");
        langItems.forEach(item => {
            item.addEventListener("click", function(e) {
                e.preventDefault();
                const url = new URL(window.location.href);
                const targetLang = new URL(this.href).searchParams.get("lang");
                url.searchParams.set("lang", targetLang);
                window.location.href = url.toString();
            });
        });
    });
</script>
