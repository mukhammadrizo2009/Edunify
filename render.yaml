services:
  - type: web
    name: edunify
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py create_superuser"
    startCommand: "gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edunify-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false          # Render dashboarddan qo'lda kiritiladi

databases:
  - name: edunify-db
    databaseName: edunify
    user: edunify
    plan: free               # 90 kun bepul PostgreSQL
